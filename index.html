function loadStorage(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function saveStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ─── WEIGHT / PROGRESSION LOGIC ──────────────────────────────────────────────
function getExKey(dayIdx, exIdx) { return `${dayIdx}_${exIdx}`; }

function getLastSession(dayIdx, exIdx) {
  const key = getExKey(dayIdx, exIdx);
  const history = weightLog[key];
  if (!history || history.length === 0) return null;
  return history[history.length - 1];
}

function getTodaySessionSets(dayIdx, exIdx) {
  const key = getExKey(dayIdx, exIdx);
  return (todaySets.sets[key] || []);
}

function shouldIncrease(dayIdx, exIdx, ex) {
  const last = getLastSession(dayIdx, exIdx);
  if (!last || !last.sets || last.sets.length === 0) return false;
  const repsStr = ex.reps;
  const match = repsStr.match(/(\d+)/g);
  if (!match) return false;
  const targetReps = parseInt(match[match.length - 1]);
  const allHitTarget = last.sets.every(s => parseInt(s.r) >= targetReps);
  const enoughSets = last.sets.length >= ex.sets;
  return allHitTarget && enoughSets;
}

function logSet(dayIdx, exIdx, weight, reps) {
  const key = getExKey(dayIdx, exIdx);
  const sets = todaySets.sets[key] || [];
  sets.push({ w: weight, r: reps });
  todaySets.sets[key] = sets;
  saveStorage('dajo_today_sets', todaySets);
}

function saveSessionToHistory(dayIdx, exIdx) {
  const key = getExKey(dayIdx, exIdx);
  const sets = todaySets.sets[key];
  if (!sets || sets.length === 0) return;
  const history = weightLog[key] || [];
  history.push({ date: today, sets });
  weightLog[key] = history;
  saveStorage('dajo_weight_log', weightLog);
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startTimer(seconds, exName) {
  if (state.timerInterval) clearInterval(state.timerInterval);
  if (seconds <= 0) return;
  state.timerActive = true;
  state.timerTotal = seconds;
  state.timerRemaining = seconds;
  state.timerExName = exName;
  renderTimer();
  state.timerInterval = setInterval(() => {
    state.timerRemaining--;
    if (state.timerRemaining <= 0) {
      clearInterval(state.timerInterval);
      state.timerActive = false;
      try { const a = new AudioContext(); const o = a.createOscillator(); const g = a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value = 880; g.gain.setValueAtTime(0.3, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.8); o.start(); o.stop(a.currentTime + 0.8); } catch(e){}
      renderTimer();
      render();
    } else {
      renderTimer();
    }
  }, 1000);
  render();
}

function skipTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerActive = false;
  renderTimer();
  render();
}

function renderTimer() {
  const c = document.getElementById('timer-container');
  if (!c) return;
  if (!state.timerActive) { c.innerHTML = ''; return; }
  const r = state.timerRemaining;
  const total = state.timerTotal;
  const pct = r / total;
  const size = 200; const stroke = 8; const radius = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * radius;
  const offset = circ * (1 - pct);
  const color = r <= 10 ? '#E05252' : r <= 30 ? '#C9A84C' : '#4CAF7D';

  c.innerHTML = `
    <div class="timer-overlay" onclick="">
      <div class="timer-label">PAUSE</div>
      <div class="timer-ex-name">${state.timerExName}</div>
      <div class="timer-circle">
        <svg width="${size}" height="${size}" style="position:absolute;top:0;left:0">
          <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="#222" stroke-width="${stroke}"/>
          <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="${stroke}"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
            transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 0.9s linear,stroke 0.3s"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
          <div class="timer-seconds" style="color:${color}">${r}</div>
        </div>
      </div>
      <button class="timer-skip" onclick="skipTimer()">Überspringen</button>
    </div>`;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getTotals() {
  const meals = state.nutrition.meals || {};
  return Object.values(meals).reduce((t, slot) => {
    Object.values(slot).forEach(item => { if (item) { t.kcal+=item.kcal; t.p+=item.p; t.c+=item.c; t.f+=item.f; } });
    return t;
  }, {kcal:0,p:0,c:0,f:0});
}
function getMealKcal(mId) {
  const slot = (state.nutrition.meals||{})[mId]||{};
  return Object.values(slot).reduce((s,item)=>s+(item?item.kcal:0),0);
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') el.className=v;
    else if(k==='style') el.style.cssText=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(child=>{
    if(child==null) return;
    if(typeof child==='string'||typeof child==='number') el.appendChild(document.createTextNode(child));
    else el.appendChild(child);
  });
  return el;
}

function Ring(value, max, color, size, label, sub) {
  const r=(size-12)/2, circ=2*Math.PI*r, pct=Math.min(value/max,1), over=value>max, offset=circ*(1-pct);
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',size); svg.setAttribute('height',size);
  const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx',size/2);bg.setAttribute('cy',size/2);bg.setAttribute('r',r);
  bg.setAttribute('fill','none');bg.setAttribute('stroke','#333');bg.setAttribute('stroke-width','6');
  const fg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  fg.setAttribute('cx',size/2);fg.setAttribute('cy',size/2);fg.setAttribute('r',r);
  fg.setAttribute('fill','none');fg.setAttribute('stroke',over?'#E05252':color);fg.setAttribute('stroke-width','6');
  fg.setAttribute('stroke-dasharray',circ);fg.setAttribute('stroke-dashoffset',offset);
  fg.setAttribute('stroke-linecap','round');fg.setAttribute('transform',`rotate(-90 ${size/2} ${size/2})`);
  const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x','50%');txt.setAttribute('y','50%');txt.setAttribute('text-anchor','middle');
  txt.setAttribute('dominant-baseline','central');txt.setAttribute('fill',over?'#E05252':'#F2F2F2');
  txt.setAttribute('font-size','11');txt.setAttribute('font-weight','800');txt.setAttribute('font-family','monospace');
  txt.textContent=Math.round(value);
  svg.appendChild(bg);svg.appendChild(fg);svg.appendChild(txt);
  return h('div',{class:'ring-wrap'},svg,h('div',{class:'ring-label'},label),sub?h('div',{class:'ring-sub'},sub):null);
}

      h('div',{class:'flex-between',style:'margin-bottom:12px'},
        h('div',{style:'font-size:13px;font-weight:800;color:#F2F2F2'},MEALS.find(m=>m.id===state.activeMeal)?.label),
        h('button',{style:'font-size:11px;color:#E05252;background:none;border:1px solid rgba(224,82,82,0.2);border-radius:6px;padding:3px 8px;cursor:pointer',
          onClick:()=>{state.nutrition.meals={...(state.nutrition.meals||{}),[state.activeMeal]:{}};saveStorage('dajo_nutrition_day',state.nutrition);render();}
        },'Leeren')
      ),
      ...Object.entries(FOOD_BLOCKS).map(([bk,bl])=>{
        const item=mealData[bk];
        if(!item) return null;
        return h('div',{class:'selected-meal-item',style:`border-left:3px solid ${bl.accent}`},
          h('div',{},h('div',{style:'font-size:12px;font-weight:700;color:#F2F2F2'},item.name),h('div',{style:'font-size:11px;color:#555'},item.amount)),
          h('div',{style:'text-align:right'},h('div',{style:'font-size:12px;font-weight:700;color:#F2F2F2'},`${item.kcal} kcal`),h('div',{style:'font-size:10px;color:#555'},`${item.p}P · ${item.c}C · ${item.f}F`))
        );
      }).filter(Boolean),
      Object.values(mealData).filter(Boolean).length===0?h('div',{style:'font-size:12px;color:#555;text-align:center;padding:12px 0'},'Noch nichts eingetragen — wähle unten'):null
    ),
    h('div',{class:'block-tabs'},...Object.entries(FOOD_BLOCKS).map(([k,b])=>
      h('button',{class:'block-tab',style:state.activeBlock===k?`border-color:${b.accent};color:${b.accent};background:${b.accent}18`:'color:#555',
        onClick:()=>setState({activeBlock:k})},b.label)
    )),
    h('div',{},...block.items.map(item=>{
      const isSel=mealData[state.activeBlock]?.name===item.name;
      return h('div',{class:`food-item${isSel?' selected':''}`,
        style:isSel?`border-color:${block.accent};background:${block.accent}12`:'',
        onClick:()=>{
          const slot=(state.nutrition.meals||{})[state.activeMeal]||{};
          const existing=slot[state.activeBlock];
          const newSlot={...slot,[state.activeBlock]:existing?.name===item.name?null:item};
          state.nutrition.meals={...(state.nutrition.meals||{}),[state.activeMeal]:newSlot};
          saveStorage('dajo_nutrition_day',state.nutrition);render();
        }},
        h('div',{},h('div',{style:`font-size:13px;font-weight:${isSel?800:600};color:${isSel?block.accent:'#F2F2F2'}`},item.name),h('div',{style:'font-size:11px;color:#555;margin-top:2px'},item.amount)),
        h('div',{style:'text-align:right'},h('div',{style:`font-size:13px;font-weight:700;color:${isSel?block.accent:'#F2F2F2'}`},`${item.kcal} kcal`),h('div',{style:'font-size:10px;color:#555'},`${item.p}P · ${item.c}C · ${item.f}F`))
      );
    }))
  );
}

function renderProgress() {
  const logs=state.logs||[];
  const startWeight=83,startKfa=17.5;
  const latestW=logs[0]?.weight||startWeight, latestK=logs[0]?.kfa||startKfa;
  const wDiff=+(latestW-startWeight).toFixed(1), kDiff=+(latestK-startKfa).toFixed(1);

  return h('div',{class:'screen'},
    h('div',{class:'screen-header'},
      h('div',{class:'eyebrow'},'Fortschritt'),
      h('div',{class:'title'},'Tracker')
    ),
    h('div',{style:'display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px'},
      ...[
        {label:'GEWICHT',value:`${latestW}`,unit:'kg',diff:wDiff},
        {label:'KFA',value:`${latestK}`,unit:'%',diff:kDiff},
        {label:'EINTRÄGE',value:`${logs.length}`,unit:'',diff:null},
      ].map(s=>h('div',{class:'stat-card',style:'text-align:center'},
        h('div',{style:'font-size:9px;color:#555;letter-spacing:1px;margin-bottom:6px'},s.label),
        h('div',{style:'font-size:22px;font-weight:900;color:#F2F2F2'},s.value,h('span',{style:'font-size:11px;color:#555'},s.unit)),
        s.diff!==null&&s.diff!==0?h('div',{style:`font-size:11px;color:${s.diff<0?'#4CAF7D':'#E05252'};margin-top:4px`},`${s.diff>0?'+':''}${s.diff}${s.unit}`):null
      ))
    ),
    h('div',{class:'card'},
      h('div',{class:'card-label'},'EINTRAG HINZUFÜGEN'),
      h('div',{class:'two-col'},
        h('div',{},h('div',{class:'input-label'},'Gewicht (kg)'),h('input',{class:'input-field',type:'number',placeholder:'83.0',value:state.weightInput,onInput:e=>{state.weightInput=e.target.value;}})),
        h('div',{},h('div',{class:'input-label'},'KFA (%)'),h('input',{class:'input-field',type:'number',placeholder:'17.5',value:state.kfaInput,onInput:e=>{state.kfaInput=e.target.value;}}))
      ),
      h('div',{style:'margin-bottom:12px'},h('div',{class:'input-label'},'Notiz (optional)'),h('input',{class:'input-field',placeholder:'Wie fühlst du dich heute?',value:state.noteInput,onInput:e=>{state.noteInput=e.target.value;}})),
      h('button',{class:`btn-primary${state.savedFlash?' btn-saved':''}`,onClick:()=>{
        if(!state.weightInput) return;
        const entry={date:new Date().toLocaleDateString('de-DE'),weight:parseFloat(state.weightInput),kfa:parseFloat(state.kfaInput)||null,note:state.noteInput};
        state.logs=[entry,...state.logs]; saveStorage('dajo_logs',state.logs);
        state.weightInput='';state.kfaInput='';state.noteInput='';state.savedFlash=true;render();
        setTimeout(()=>{state.savedFlash=false;render();},2000);
      }},state.savedFlash?'✓ Gespeichert':'Eintrag speichern')
    ),
    h('div',{class:'card'},
      h('div',{class:'card-label'},'ROADMAP ZUM ZIEL'),
      ...MILESTONES.map((m,i)=>h('div',{class:'milestone-item'},
        h('div',{class:'milestone-bar',style:`background:${i===0?'#C9A84C':'#333'}`}),
        h('div',{},
          h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:4px'},
            h('span',{style:`font-size:12px;font-weight:900;color:${i===0?'#C9A84C':'#F2F2F2'}`},m.label),
            h('span',{class:'tag',style:`color:${i===0?'#C9A84C':'#555'};background:${i===0?'rgba(201,168,76,0.12)':'rgba(80,80,80,0.15)'}`},m.target)
          ),
          h('div',{style:'font-size:12px;color:#555'},m.desc)
        )
      ))
    ),
    logs.length>0?h('div',{class:'card'},
      h('div',{class:'card-label'},'VERLAUF'),
      ...logs.slice(0,10).map(l=>h('div',{class:'log-entry'},
        h('div',{},h('div',{style:'font-size:13px;font-weight:700;color:#F2F2F2'},l.date),l.note?h('div',{style:'font-size:11px;color:#555;margin-top:2px'},l.note):null),
        h('div',{style:'text-align:right'},h('div',{style:'font-size:13px;font-weight:800;color:#F2F2F2'},`${l.weight} kg`),l.kfa?h('div',{style:'font-size:11px;color:#555'},`${l.kfa}% KFA`):null)
      ))
    ):null
  );
}

function renderNav() {
  const items=[{id:'home',icon:'⌂',label:'Heute'},{id:'training',icon:'◈',label:'Training'},{id:'nutrition',icon:'◉',label:'Ernährung'},{id:'progress',icon:'▲',label:'Fortschritt'}];
  return h('nav',{class:'nav-bar'},...items.map(item=>
    h('button',{class:'nav-item',onClick:()=>setState({tab:item.id})},
      h('span',{class:'nav-icon',style:`opacity:${state.tab===item.id?1:0.3}`},item.icon),
      h('span',{class:'nav-text',style:`color:${state.tab===item.id?'#C9A84C':'#555'}`},item.label),
      state.tab===item.id?h('div',{class:'nav-dot'}):null
    )
  ));
}

function render() {
  const app=document.getElementById('app');
  app.innerHTML='';
  let screen;
  if(state.tab==='home') screen=renderHome();
  else if(state.tab==='training') screen=renderTraining();
  else if(state.tab==='nutrition') screen=renderNutrition();
  else screen=renderProgress();
  app.appendChild(screen);
  app.appendChild(renderNav());
}

render();
</script>
</body>
</html>
