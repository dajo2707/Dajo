function loadStorage(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function saveStorage(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

  activeBlock: 'protein',
  logs: loadStorage('dajo_logs', []),
  weightInput: '',
  kfaInput: '',
  noteInput: '',
  savedFlash: false,
};

const today = new Date().toDateString();
if (state.suppsDone.date !== today) {
  state.suppsDone = { date: today, items: [] };

}
if (state.nutrition.date !== today) {
  state.nutrition = { date: today, meals: {} };
  saveStorage('dajo_nutrition_day', state.nutrition);
}

function getTodayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function getTotals() {
  const meals = state.nutrition.meals || {};
  return Object.values(meals).reduce((t, slot) => {
    Object.values(slot).forEach(item => {
      if (item) { t.kcal += item.kcal; t.p += item.p; t.c += item.c; t.f += item.f; }
    });
    return t;
  }, {kcal:0, p:0, c:0, f:0});
}

function getMealKcal(mId) {
  const slot = (state.nutrition.meals || {})[mId] || {};
  return Object.values(slot).reduce((s, item) => s + (item ? item.kcal : 0), 0);
}

function getSuppCount() {
  return (state.suppsDone.items || []).length;
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'class') el.className = v;
      else if (k === 'style') el.style.cssText = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else el.setAttribute(k, v);
    });
  }
  children.flat(Infinity).forEach(child => {
    if (child == null) return;
    if (typeof child === 'string' || typeof child === 'number') el.appendChild(document.createTextNode(child));
    else el.appendChild(child);
  });
  return el;
}

function MacroBar(label, value, max, color) {
  const pct = Math.min((value / max) * 100, 100);
  const over = value > max;
  return h('div', {class:'macro-bar-wrap'},
    h('div', {class:'macro-bar-head'},
      h('span', {style:'color:#555'}, label),
      h('span', {style:`color:${over?'#E05252':'#F2F2F2'};font-weight:700`}, `${Math.round(value)}`, h('span', {style:'color:#555'}, `/${max}`))
    ),
    h('div', {class:'macro-bar-track'},
      h('div', {class:'macro-bar-fill', style:`width:${pct}%;background:${over?'#E05252':color}`})
    )
  );
}

function Ring(value, max, color, size, label, sub) {
  const r = (size - 12) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(value / max, 1);
  const over = value > max;
  const offset = circ * (1 - pct);
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  bg.setAttribute('cx', size/2); bg.setAttribute('cy', size/2); bg.setAttribute('r', r);
  bg.setAttribute('fill', 'none'); bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '6');
  const fg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  fg.setAttribute('cx', size/2); fg.setAttribute('cy', size/2); fg.setAttribute('r', r);
  fg.setAttribute('fill', 'none'); fg.setAttribute('stroke', over ? '#E05252' : color); fg.setAttribute('stroke-width', '6');
  fg.setAttribute('stroke-dasharray', circ); fg.setAttribute('stroke-dashoffset', offset);
  fg.setAttribute('stroke-linecap', 'round');
  fg.setAttribute('transform', `rotate(-90 ${size/2} ${size/2})`);
  fg.style.transition = 'stroke-dashoffset 0.4s ease';
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', '50%'); txt.setAttribute('y', '50%');
  txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('dominant-baseline', 'central');
  txt.setAttribute('fill', over ? '#E05252' : '#F2F2F2');
  txt.setAttribute('font-size', '11'); txt.setAttribute('font-weight', '800');
  txt.setAttribute('font-family', 'monospace');
  txt.textContent = Math.round(value);
  svg.appendChild(bg); svg.appendChild(fg); svg.appendChild(txt);
  return h('div', {class:'ring-wrap'}, svg,
    h('div', {class:'ring-label'}, label),
    sub ? h('div', {class:'ring-sub'}, sub) : null
  );
}

      h('div', {style:`font-size:26px;font-weight:900;color:${totals.kcal>TARGETS.kcal?'#E05252':'#F2F2F2'}`}, Math.round(totals.kcal)),
      h('div', {style:'font-size:11px;color:#555'}, `von ${TARGETS.kcal} kcal`),
      h('div', {class:'progress-bar-simple'}, h('div', {class:'progress-bar-fill', style:`width:${kcalPct}%;background:#C9A84C`}))
    ),
    h('div', {class:'stat-card'},
      h('div', {style:'font-size:10px;color:#555;letter-spacing:1px;margin-bottom:8px'}, 'SUPPLEMENTS'),
      h('div', {style:'font-size:26px;font-weight:900;color:#F2F2F2'}, suppCount, h('span', {style:'font-size:14px;color:#555'}, `/${SUPPS.length}`)),
      h('div', {style:'font-size:11px;color:#555'}, 'heute genommen'),
      h('div', {class:'progress-bar-simple'}, h('div', {class:'progress-bar-fill', style:`width:${suppPct}%;background:#4CAF7D`}))
    )

  const suppList = h('div', {class:'card'},

  const dayTabs = h('div', {class:'pill-row'},
    ...WEEK_PLAN.map((d, i) => h('button', {
      class:`pill${state.trainingDay===i?' active':''}`,
      style: state.trainingDay===i ? 'border-color:#C9A84C;color:#C9A84C;background:rgba(201,168,76,0.12)' : '',
      onClick: () => setState({trainingDay:i})

          saveStorage('dajo_ex', state.exerciseDone);
          render();
        }
      },
        h('div', {style:'flex:1'},
          h('div', {class:'flex-center', style:'gap:10px'},
            h('div', {style:`width:22px;height:22px;border-radius:7px;flex-shrink:0;border:${isDone?'none':'1.5px solid #333'};background:${isDone?'#4CAF7D':'transparent'};display:flex;align-items:center;justify-content:center`},
              isDone ? h('span', {style:'color:#000;font-size:13px;font-weight:900'}, '✓') : null

            h('div', {style:`font-size:14px;font-weight:800;color:${isDone?'#555':'#F2F2F2'};text-decoration:${isDone?'line-through':'none'}`}, ex.name)
          ),
          ex.note ? h('div', {style:'font-size:11px;color:#555;margin-top:4px;margin-left:32px'}, ex.note) : null
        ),
        h('div', {style:'text-align:right;margin-left:12px'},
          h('div', {style:'font-size:13px;font-weight:800;color:#C9A84C'}, `${ex.sets}×${ex.reps}`),
          h('div', {style:'font-size:10px;color:#555;margin-top:2px'}, ex.rest)

  const cardio = h('div', {class:'cardio-box'},

  return h('div', {class:'screen'},

function renderNutrition() {
  const totals = getTotals();
  const meals = state.nutrition.meals || {};
  const mealData = meals[state.activeMeal] || {};
  const block = FOOD_BLOCKS[state.activeBlock];

  const rings = h('div', {class:'card'},
    h('div', {class:'macro-rings'},
      Ring(totals.kcal, TARGETS.kcal, '#C9A84C', 72, 'KCAL', `/${TARGETS.kcal}`),
      Ring(totals.p, TARGETS.p, '#4A90D9', 72, 'PROTEIN', `/${TARGETS.p}g`),
      Ring(totals.c, TARGETS.c, '#C9A84C', 72, 'CARBS', `/${TARGETS.c}g`),
      Ring(totals.f, TARGETS.f, '#4CAF7D', 72, 'FETT', `/${TARGETS.f}g`)
    )
  );

  const mealTabs = h('div', {class:'pill-row'},
    ...MEALS.map(m => {
      const kcal = getMealKcal(m.id);
      const isA = state.activeMeal === m.id;
      return h('button', {
        class:`pill${isA?' active':''}`,
        style: isA ? 'border-color:#C9A84C;color:#C9A84C;background:rgba(201,168,76,0.12);min-width:90px;text-align:left;padding:10px 12px' : 'min-width:90px;text-align:left;padding:10px 12px',
        onClick: () => setState({activeMeal: m.id})
      },
        h('div', {style:`font-size:10px;font-weight:700;color:${isA?'#C9A84C':'#555'}`}, m.time),
        h('div', {style:`font-size:12px;font-weight:800;color:${isA?'#C9A84C':'#F2F2F2'}`}, m.label),
        h('div', {style:'font-size:10px;color:#555;margin-top:2px'}, kcal > 0 ? `${Math.round(kcal)} kcal` : m.note)
      );
    })
  );

  const selectedItems = Object.entries(FOOD_BLOCKS).map(([bk, bl]) => {
    const item = mealData[bk];
    if (!item) return null;
    return h('div', {class:'selected-meal-item', style:`border-left:3px solid ${bl.accent}`},
      h('div', {},
        h('div', {style:'font-size:12px;font-weight:700;color:#F2F2F2'}, item.name),
        h('div', {style:'font-size:11px;color:#555'}, item.amount)
      ),
      h('div', {style:'text-align:right'},
        h('div', {style:'font-size:12px;font-weight:700;color:#F2F2F2'}, `${item.kcal} kcal`),
        h('div', {style:'font-size:10px;color:#555'}, `${item.p}P · ${item.c}C · ${item.f}F`)
      )
    );
  }).filter(Boolean);

  const mealCard = h('div', {class:'card', style:'margin-bottom:14px'},
    h('div', {class:'flex-between', style:'margin-bottom:12px'},
      h('div', {style:'font-size:13px;font-weight:800;color:#F2F2F2'}, MEALS.find(m=>m.id===state.activeMeal)?.label),
      h('button', {
        style:'font-size:11px;color:#E05252;background:none;border:1px solid rgba(224,82,82,0.2);border-radius:6px;padding:3px 8px;cursor:pointer',
        onClick: () => {
          state.nutrition.meals = {...(state.nutrition.meals||{}), [state.activeMeal]:{}};
          saveStorage('dajo_nutrition_day', state.nutrition);
          render();
        }
      }, 'Leeren')
    ),
    selectedItems.length > 0 ? h('div', {}, ...selectedItems) :
      h('div', {style:'font-size:12px;color:#555;text-align:center;padding:12px 0'}, 'Noch nichts eingetragen — wähle unten')
  );

  const blockTabs = h('div', {class:'block-tabs'},
    ...Object.entries(FOOD_BLOCKS).map(([k, b]) => h('button', {
      class:'block-tab',
      style: state.activeBlock===k ? `border-color:${b.accent};color:${b.accent};background:${b.accent}18` : 'color:#555',
      onClick: () => setState({activeBlock: k})
    }, b.label))
  );

  const foodList = h('div', {},
    ...block.items.map(item => {
      const isSel = mealData[state.activeBlock]?.name === item.name;
      return h('div', {
        class:`food-item${isSel?' selected':''}`,
        style: isSel ? `border-color:${block.accent};background:${block.accent}12` : '',
        onClick: () => {
          const slot = (state.nutrition.meals||{})[state.activeMeal] || {};
          const existing = slot[state.activeBlock];
          const newSlot = {...slot, [state.activeBlock]: existing?.name===item.name ? null : item};
          state.nutrition.meals = {...(state.nutrition.meals||{}), [state.activeMeal]: newSlot};
          saveStorage('dajo_nutrition_day', state.nutrition);
          render();
        }
      },
        h('div', {},
          h('div', {style:`font-size:13px;font-weight:${isSel?800:600};color:${isSel?block.accent:'#F2F2F2'}`}, item.name),
          h('div', {style:'font-size:11px;color:#555;margin-top:2px'}, item.amount)
        ),
        h('div', {style:'text-align:right'},
          h('div', {style:`font-size:13px;font-weight:700;color:${isSel?block.accent:'#F2F2F2'}`}, `${item.kcal} kcal`),
          h('div', {style:'font-size:10px;color:#555'}, `${item.p}P · ${item.c}C · ${item.f}F`)
        )
      );
    })
  );

  return h('div', {class:'screen'},
    h('div', {class:'screen-header'},
      h('div', {class:'eyebrow'}, 'Ernährung'),
      h('div', {class:'title'}, 'Tagesziel')
    ),
    rings, mealTabs, mealCard, blockTabs, foodList
  );
}

function renderProgress() {
  const logs = state.logs || [];
  const startWeight = 83, startKfa = 17.5;
  const latestW = logs[0]?.weight || startWeight;
  const latestK = logs[0]?.kfa || startKfa;
  const wDiff = +(latestW - startWeight).toFixed(1);
  const kDiff = +(latestK - startKfa).toFixed(1);

  const statsRow = h('div', {style:'display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px'},
    ...[
      {label:'GEWICHT', value:`${latestW}`, unit:'kg', diff:wDiff},
      {label:'KFA', value:`${latestK}`, unit:'%', diff:kDiff},
      {label:'EINTRÄGE', value:`${logs.length}`, unit:'', diff:null},
    ].map(s => h('div', {class:'stat-card', style:'text-align:center'},
      h('div', {style:'font-size:9px;color:#555;letter-spacing:1px;margin-bottom:6px'}, s.label),
      h('div', {style:'font-size:22px;font-weight:900;color:#F2F2F2'}, s.value, h('span', {style:'font-size:11px;color:#555'}, s.unit)),
      s.diff !== null && s.diff !== 0 ? h('div', {style:`font-size:11px;color:${s.diff<0?'#4CAF7D':'#E05252'};margin-top:4px`}, `${s.diff>0?'+':''}${s.diff}${s.unit}`) : null
    ))
  );

  const entryCard = h('div', {class:'card'},
    h('div', {class:'card-label'}, 'EINTRAG HINZUFÜGEN'),
    h('div', {class:'two-col'},
      h('div', {},
        h('div', {class:'input-label'}, 'Gewicht (kg)'),
        h('input', {class:'input-field', type:'number', placeholder:'83.0', value:state.weightInput,
          onInput: e => { state.weightInput = e.target.value; }})
      ),
      h('div', {},
        h('div', {class:'input-label'}, 'KFA (%)'),
        h('input', {class:'input-field', type:'number', placeholder:'17.5', value:state.kfaInput,
          onInput: e => { state.kfaInput = e.target.value; }})
      )
    ),
    h('div', {style:'margin-bottom:12px'},
      h('div', {class:'input-label'}, 'Notiz (optional)'),
      h('input', {class:'input-field', placeholder:'Wie fühlst du dich heute?', value:state.noteInput,
        onInput: e => { state.noteInput = e.target.value; }})
    ),
    h('button', {
      class:`btn-primary${state.savedFlash?' btn-saved':''}`,
      onClick: () => {
        if (!state.weightInput) return;
        const entry = {
          date: new Date().toLocaleDateString('de-DE'),
          weight: parseFloat(state.weightInput),
          kfa: parseFloat(state.kfaInput) || null,
          note: state.noteInput
        };
        state.logs = [entry, ...state.logs];
        saveStorage('dajo_logs', state.logs);
        state.weightInput = ''; state.kfaInput = ''; state.noteInput = '';
        state.savedFlash = true;
        render();
        setTimeout(() => { state.savedFlash = false; render(); }, 2000);
      }
    }, state.savedFlash ? '✓ Gespeichert' : 'Eintrag speichern')
  );

  const roadmap = h('div', {class:'card'},
    h('div', {class:'card-label'}, 'ROADMAP ZUM ZIEL'),
    ...MILESTONES.map((m, i) => h('div', {class:'milestone-item'},
      h('div', {class:'milestone-bar', style:`background:${i===0?'#C9A84C':'#333'}`}),
      h('div', {},
        h('div', {style:'display:flex;align-items:center;gap:8px;margin-bottom:4px'},
          h('span', {style:`font-size:12px;font-weight:900;color:${i===0?'#C9A84C':'#F2F2F2'}`}, m.label),
          h('span', {class:'tag', style:`color:${i===0?'#C9A84C':'#555'};background:${i===0?'rgba(201,168,76,0.12)':'rgba(80,80,80,0.15)'}`}, m.target)
        ),
        h('div', {style:'font-size:12px;color:#555'}, m.desc)
      )
    ))
  );

  const historyCard = logs.length > 0 ? h('div', {class:'card'},
    h('div', {class:'card-label'}, 'VERLAUF'),
    ...logs.slice(0,10).map((l) => h('div', {class:'log-entry'},
      h('div', {},
        h('div', {style:'font-size:13px;font-weight:700;color:#F2F2F2'}, l.date),
        l.note ? h('div', {style:'font-size:11px;color:#555;margin-top:2px'}, l.note) : null
      ),
      h('div', {style:'text-align:right'},
        h('div', {style:'font-size:13px;font-weight:800;color:#F2F2F2'}, `${l.weight} kg`),
        l.kfa ? h('div', {style:'font-size:11px;color:#555'}, `${l.kfa}% KFA`) : null
      )
    ))
  ) : null;

  return h('div', {class:'screen'},
    h('div', {class:'screen-header'},
      h('div', {class:'eyebrow'}, 'Fortschritt'),
      h('div', {class:'title'}, 'Tracker')
    ),
    statsRow, entryCard, roadmap, historyCard
  );
}

function renderNav() {
  const items = [
    {id:'home', icon:'⌂', label:'Heute'},
    {id:'training', icon:'◈', label:'Training'},
    {id:'nutrition', icon:'◉', label:'Ernährung'},
    {id:'progress', icon:'▲', label:'Fortschritt'},
  ];
  return h('nav', {class:'nav-bar'},
    ...items.map(item => h('button', {class:'nav-item', onClick: () => setState({tab: item.id})},
      h('span', {class:'nav-icon', style:`opacity:${state.tab===item.id?1:0.3}`}, item.icon),
      h('span', {class:'nav-text', style:`color:${state.tab===item.id?'#C9A84C':'#555'}`}, item.label),
      state.tab===item.id ? h('div', {class:'nav-dot'}) : null
    ))
  );
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  let screen;
  if (state.tab === 'home') screen = renderHome();
  else if (state.tab === 'training') screen = renderTraining();
  else if (state.tab === 'nutrition') screen = renderNutrition();
  else screen = renderProgress();
  app.appendChild(screen);
  app.appendChild(renderNav());
}

render();
